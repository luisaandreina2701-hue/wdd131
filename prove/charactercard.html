<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Character Card</title>

    <!-- Social Media Meta Information -->
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="WDD 131 Character Card Project">
    <meta property="og:image" content="images/swamp-beast.jpg">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="charactercard.css">
    <script src="charactercard.js" defer></script>
</head>
<body>

    <div class="card">
        <img id="characterImage" class="image" src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=800" alt="Character">

        <div class="name" id="characterName"></div>

        <div class="stats">
            <p><strong>Class:</strong> <span id="characterClass"></span></p>
            <p><strong>Level:</strong> <span id="characterLevel"></span></p>
            <p><strong>Health:</strong> <span id="characterHealth"></span></p>
        </div>

        <div class="buttons">
            <button id="attackBtn">Attack</button>
            <button id="levelBtn">Level Up</button>
        </div>
    </div>

</body>
</html>
