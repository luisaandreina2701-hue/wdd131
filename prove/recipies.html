<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="recipies.css">

    <title>Recipe Book</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="Find delicious recipes for every occasion.">
    <meta property="og:url" content="https://yourgithubusername.github.io/wdd131/recipes/">
    <meta property="og:image" content="images/social-preview-image.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="Find delicious recipes for every occasion.">
    <meta name="twitter:image" content="images/social-preview-image.png">

    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
</head>

<body>

<header>
    <div class="logo">
        <img src="images/recipe-book.png" alt="Recipe Book Logo">
        <h1>RecipeBook</h1>
    </div>
</header>

<main>

    <form class="search">
        <input type="text" placeholder="Find a recipe">
        <button type="submit">
            <img src="images/search.png" alt="Search">
        </button>
    </form>

    <article class="recipe-card">

        <img class="recipe-image"
             src="images/Warm Apple Crumble_ Vanilla bean ice cream, salted caramel_.jpeg"
             alt="Apple Crisp">

        <div class="recipe-details">

            <div class="tag">dessert</div>

            <h2>Apple Crisp</h2>

            <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars"
            >
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">☆</span>
            </span>

            <p class="description">
                This apple crisp recipe is a simple yet delicious fall
                dessert that's great served warm with vanilla ice cream.
            </p>

        </div>

    </article>

</main>

<footer>

    <a href="https://www.flaticon.com/free-icons/recipe"
       title="recipe icons">
        Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
        <a href="#"><img src="images/instagram.png" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube.png" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest.png" alt="pinterest icon"></a>
    </div>

</footer>

</body>
</html>
